<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" stroke="#C4A962" stroke-width="2.5" opacity="0.9"/>
  <!-- Middle ring (tilted) -->
  <ellipse cx="32" cy="32" rx="20" ry="28" stroke="#A78BFA" stroke-width="2" opacity="0.7" transform="rotate(30 32 32)"/>
  <!-- Inner ring (tilted opposite) -->
  <ellipse cx="32" cy="32" rx="20" ry="28" stroke="#6366F1" stroke-width="1.5" opacity="0.6" transform="rotate(-30 32 32)"/>
  <!-- Core orb -->
  <circle cx="32" cy="32" r="6" fill="url(#core)"/>
  <!-- Orb glow -->
  <circle cx="32" cy="32" r="10" fill="url(#glow)"/>
  <defs>
    <radialGradient id="core" cx="0.4" cy="0.35">
      <stop offset="0%" stop-color="#E0CC8A"/>
      <stop offset="100%" stop-color="#C4A962"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#C4A962" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C4A962" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
